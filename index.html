
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Machine à Sous</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .slot-machine {
      display: flex;
      gap: 40px;
      font-size: 80px;
    }
    .reel {
      width: 100px;
      height: 100px;
      border: 4px solid white;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }
    .result {
      margin-top: 30px;
      min-height: 60px;
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-align: center;
      -webkit-text-stroke: 2px black;
      text-shadow:
        3px 3px 0 black,
        -3px 3px 0 black,
        3px -3px 0 black,
        -3px -3px 0 black,
        0 0 10px black;
    }
  </style>
</head>
<body>
  <div class="slot-machine">
    <div class="reel" id="r1">🎰</div>
    <div class="reel" id="r2">🎰</div>
    <div class="reel" id="r3">🎰</div>
  </div>

  <div class="result" id="result"></div>

  <script>
    const items = ['🥕', '🍅', '🥬', '🪏', '🪱', '🌳', '🐹', '🚲'];
    const reelIds = ['r1', 'r2', 'r3'];
    const resultEl = document.getElementById('result');

    let finalResults = [];

    function getRandomItem() {
      return items[Math.floor(Math.random() * items.length)];
    }

    function spinReel(id, delay, onComplete) {
      let count = 0;
      let finalItem = getRandomItem();
      const el = document.getElementById(id);

      const interval = setInterval(() => {
        finalItem = getRandomItem();
        el.textContent = finalItem;
        count++;

        if (count > 20 + delay * 5) {
          clearInterval(interval);
          onComplete(finalItem);
        }
      }, 100);
    }

    function startSpin() {
      finalResults = [];
      resultEl.textContent = '';

      reelIds.forEach((id, index) => {
        setTimeout(() => {
          spinReel(id, index, (finalItem) => {
            finalResults[index] = finalItem;

            if (finalResults.filter(Boolean).length === reelIds.length) {
              checkResult();
            }
          });
        }, index * 200);
      });
    }

    function checkResult() {
      const [r1, r2, r3] = finalResults;
      const allSame = r1 === r2 && r2 === r3;
      const hasBike = finalResults.includes('🚲');

      if (allSame && r1 === '🪏') {
        resultEl.textContent = 'ET C’EST UN BAN !!!';
        return;
      }

      if (allSame) {
        resultEl.textContent = 'ET C’EST UNE BICYCLETTE !!!';
        return;
      }

      if (hasBike) {
        startCountdownAndRelaunch();
      }
    }

    function startCountdownAndRelaunch() {
      let seconds = 5;
      resultEl.textContent = `ON RELANCE DANS ${seconds}`;

      const countdown = setInterval(() => {
        seconds--;
        resultEl.textContent = `ON RELANCE DANS ${seconds}`;

        if (seconds <= 0) {
          clearInterval(countdown);
          startSpin();
        }
      }, 1000);
    }

    window.onload = () => {
      startSpin();
    };
  </script>
</body>
</html>
