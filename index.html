
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Machine à Sous</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .slot-machine {
      display: flex;
      gap: 40px;
      font-size: 80px;
    }
    .reel {
      width: 100px;
      height: 100px;
      border: 4px solid white;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="slot-machine">
    <div class="reel" id="r1">🎰</div>
    <div class="reel" id="r2">🎰</div>
    <div class="reel" id="r3">🎰</div>
  </div>

  <script>
    const items = ['🥕', '🍅', '🥬','🪏', '🪱', '🌳', '🐹', '🚲'];
    function getRandomItem() {
      return items[Math.floor(Math.random() * items.length)];
    }

    function spinReel(id, delay) {
      let count = 0;
      const el = document.getElementById(id);
      const interval = setInterval(() => {
        el.textContent = getRandomItem();
        count++;
        if (count > 20 + delay * 5) clearInterval(interval);
      }, 100);
    }

    window.onload = () => {
      spinReel('r1', 0);
      setTimeout(() => spinReel('r2', 1), 200);
      setTimeout(() => spinReel('r3', 2), 400);
    };
  </script>
</body>
</html>
