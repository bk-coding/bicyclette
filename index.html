<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Machine à Sous</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .slot-machine {
      display: flex;
      gap: 40px;
      font-size: 80px;
    }
    .reel {
      position: relative;
      width: 100px;
      height: 100px;
      border: 4px solid white;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      overflow: visible;
    }
    .reel.explode {
      animation: reelDestruction 3s ease-out forwards;
    }
    .reel.explode::before {
      content: '💥';
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 120px;
      pointer-events: none;
      animation: bombExplosion 3s ease-out forwards;
      z-index: 3;
    }
    .reel.explode::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      box-shadow:
        0 0 0 4px #ffffff,
        18px -12px 0 2px #ffdd55,
        -22px 16px 0 3px #ff7a00,
        30px 20px 0 2px #ffffff,
        -30px -24px 0 2px #ffdd55,
        6px 36px 0 3px #ff7a00,
        -8px -40px 0 2px #ffffff;
      animation: explosionDebris 3s ease-out forwards;
      z-index: 2;
    }
    .reel.dance {
      animation: reelDance 0.45s ease-in-out infinite alternate;
    }
    .result {
      margin-top: 30px;
      min-height: 60px;
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-align: center;
      -webkit-text-stroke: 2px black;
      text-shadow:
        3px 3px 0 black,
        -3px 3px 0 black,
        3px -3px 0 black,
        -3px -3px 0 black,
        0 0 10px black;
    }

    @keyframes reelDestruction {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
        filter: brightness(1);
        border-color: white;
        background: rgba(0,0,0,0.5);
      }
      8% {
        transform: scale(1.15) rotate(-8deg);
        filter: brightness(2.4);
      }
      16% {
        transform: scale(0.95) rotate(8deg);
      }
      28% {
        transform: scale(1.35) rotate(-16deg);
        opacity: 1;
        filter: brightness(3);
      }
      45% {
        transform: scale(0.75) rotate(22deg) translateY(12px);
        opacity: 0.65;
        border-color: rgba(255,255,255,0.35);
        background: rgba(0,0,0,0.25);
      }
      70% {
        transform: scale(0.35) rotate(-35deg) translateY(40px);
        opacity: 0.18;
        border-color: transparent;
        background: transparent;
      }
      100% {
        transform: scale(0) rotate(60deg) translateY(80px);
        opacity: 0;
        filter: brightness(1);
        border-color: transparent;
        background: transparent;
      }
    }

    @keyframes bombExplosion {
      0% {
        transform: scale(0.2) rotate(0deg);
        opacity: 0;
      }
      10% {
        transform: scale(1.25) rotate(-8deg);
        opacity: 1;
      }
      30% {
        transform: scale(2) rotate(8deg);
        opacity: 0.95;
      }
      60% {
        transform: scale(2.8) rotate(-12deg);
        opacity: 0.45;
      }
      100% {
        transform: scale(3.6) rotate(20deg);
        opacity: 0;
      }
    }

    @keyframes explosionDebris {
      0% {
        transform: translate(-50%, -50%) scale(0.1);
        opacity: 0;
      }
      12% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      45% {
        transform: translate(-50%, -50%) scale(4) rotate(120deg);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(8) rotate(260deg);
        opacity: 0;
      }
    }

    @keyframes reelDance {
      0% {
        transform: translateX(-8px) rotate(-8deg) scale(1.05);
      }
      100% {
        transform: translateX(8px) rotate(8deg) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="slot-machine">
    <div class="reel" id="r1">🎰</div>
    <div class="reel" id="r2">🎰</div>
    <div class="reel" id="r3">🎰</div>
  </div>

  <div class="result" id="result"></div>
  <audio id="jingle" src="jingle.mp3" preload="auto"></audio>

  <script>
    const items = ['🥕', '🍅', '🥬', '🪏', '🪱', '🌳', '🐹', '🚲', '🪧'];
    const reelIds = ['r1', 'r2', 'r3'];
    const resultEl = document.getElementById('result');
    const jingleEl = document.getElementById('jingle');

    // Pourcentage de chances d'obtenir une combinaison de 3 symboles identiques.
    // 0.10 = 10 %, 0.25 = 25 %, 1 = 100 %.
    const SAME_SYMBOL_CHANCE = 0.10;

    let finalResults = [];

    function getRandomItem() {
      return items[Math.floor(Math.random() * items.length)];
    }

    function generateSpinResults() {
      const shouldForceSameSymbols = Math.random() < SAME_SYMBOL_CHANCE;

      if (shouldForceSameSymbols) {
        const winningItem = getRandomItem();
        return [winningItem, winningItem, winningItem];
      }

      let results;

      do {
        results = [getRandomItem(), getRandomItem(), getRandomItem()];
      } while (results[0] === results[1] && results[1] === results[2]);

      return results;
    }

    function clearReelAnimations() {
      reelIds.forEach((id) => {
        const reel = document.getElementById(id);
        reel.classList.remove('explode', 'dance');
        reel.style.transform = '';
        reel.style.opacity = '';
      });
    }

    function triggerExplosionAnimation() {
      clearReelAnimations();

      reelIds.forEach((id) => {
        const reel = document.getElementById(id);
        void reel.offsetWidth;
        reel.classList.add('explode');
      });
    }

    function triggerDanceAnimation() {
      clearReelAnimations();

      reelIds.forEach((id, index) => {
        const reel = document.getElementById(id);
        reel.style.animationDelay = `${index * 0.12}s`;
        reel.classList.add('dance');
      });
    }

    function playJingle() {
      jingleEl.currentTime = 0;
      jingleEl.play().catch(() => {
        console.warn('Le fichier jingle.mp3 est absent ou la lecture automatique est bloquée.');
      });
    }

    function spinReel(id, delay, finalItem, onComplete) {
      let count = 0;
      const el = document.getElementById(id);

      const interval = setInterval(() => {
        el.textContent = getRandomItem();
        count++;

        if (count > 20 + delay * 5) {
          clearInterval(interval);
          el.textContent = finalItem;
          onComplete(finalItem);
        }
      }, 100);
    }

    function startSpin() {
      const plannedResults = generateSpinResults();

      finalResults = [];
      resultEl.textContent = '';
      clearReelAnimations();
      jingleEl.pause();
      jingleEl.currentTime = 0;

      reelIds.forEach((id, index) => {
        setTimeout(() => {
          spinReel(id, index, plannedResults[index], (finalItem) => {
            finalResults[index] = finalItem;

            if (finalResults.filter(Boolean).length === reelIds.length) {
              checkResult();
            }
          });
        }, index * 200);
      });
    }

    function checkResult() {
      const [r1, r2, r3] = finalResults;
      const allSame = r1 === r2 && r2 === r3;
      const hasBike = finalResults.includes('🚲');
      const isJingleCombination = r1 === '🪏' && r2 === '🪧' && r3 === '🌳';

      if (isJingleCombination) {
        triggerDanceAnimation();
        playJingle();
        resultEl.textContent = '🎶 Une bêche, une pancarte, un arbre… 🎶';
        return;
      }

      if (allSame && r1 === '🪏') {
        triggerExplosionAnimation();
        resultEl.textContent = 'COUP D\'PELLE !!!';
        return;
      }

      if (allSame) {
        triggerExplosionAnimation();
        resultEl.textContent = 'BICYCLETTE !!!';
        return;
      }

      if (hasBike) {
        startCountdownAndRelaunch();
        return;
      }

      resultEl.textContent = 'PERDU';
    }

    function startCountdownAndRelaunch() {
      let seconds = 5;
      resultEl.textContent = `ON RELANCE DANS ${seconds}`;

      const countdown = setInterval(() => {
        seconds--;
        resultEl.textContent = `ON RELANCE DANS ${seconds}`;

        if (seconds <= 0) {
          clearInterval(countdown);
          startSpin();
        }
      }, 1000);
    }

    window.onload = () => {
      startSpin();
    };
  </script>
</body>
</html>
